<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Premium Gradients -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#3a5cf5" />
    </linearGradient>
    
    <linearGradient id="drop-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>

    <linearGradient id="inner-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glowing Drop Shadow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 200)">
    
    <!-- Outer Orbit/Radar Rings representing "Monitoring/Sensors" -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#shield-grad)" stroke-width="2" stroke-dasharray="4 8" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="0" cy="0" r="145" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="30 20 10 20" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" />
    </circle>

    <!-- Background pulsing radar blip -->
    <circle cx="0" cy="0" r="120" fill="url(#shield-grad)" opacity="0.1">
      <animate attributeName="r" values="80; 160; 80" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 0; 0.2" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- The Shield/Armor Background (Safe aspect of AquaSafe) -->
    <path d="M 0,-120 L 95,-70 L 95,40 C 95,100 45,145 0,165 C -45,145 -95,100 -95,40 L -95,-70 Z" 
          fill="none" 
          stroke="url(#shield-grad)" 
          stroke-width="12" 
          stroke-linejoin="round"
          filter="url(#neon-glow)" 
          opacity="0.9" />
          
    <path d="M 0,-120 L 95,-70 L 95,40 C 95,100 45,145 0,165 C -45,145 -95,100 -95,40 L -95,-70 Z" 
          fill="rgba(15, 23, 42, 0.7)" 
          stroke="#fff" 
          stroke-width="2" 
          stroke-linejoin="round"
          opacity="0.3" />

    <!-- Pure Water Droplet Overlay (Aqua aspect) -->
    <path d="M 0,-65 C 45,-10 65,30 65,65 C 65,100 35,125 0,125 C -35,125 -65,100 -65,65 C -65,30 -45,-10 0,-65 Z" 
          fill="url(#drop-grad)" 
          filter="url(#soft-glow)" />

    <!-- Inner Core/Shine on the droplet to give it 3D glass volume -->
    <path d="M -20,-15 C -5,5 15,20 30,20 C 15,35 -15,10 -35,-20 C -30,-22 -25,-18 -20,-15 Z" 
          fill="#ffffff" 
          opacity="0.6" 
          filter="url(#soft-glow)" />
          
    <ellipse cx="-15" cy="50" rx="20" ry="10" transform="rotate(-40 -15 50)" fill="#ffffff" opacity="0.2" />

    <!-- Center Tech Node -->
    <circle cx="0" cy="65" r="12" fill="#ffffff" filter="url(#soft-glow)" />
    <!-- Connecting Tech Lines inside the drop -->
    <path d="M 0,65 L -35,35 M 0,65 L 35,35 M 0,65 L 0,0" stroke="#ffffff" stroke-width="2" opacity="0.8" stroke-dasharray="2 4"/>
    <circle cx="-35" cy="35" r="4" fill="#ffffff" />
    <circle cx="35" cy="35" r="4" fill="#ffffff" />
    <circle cx="0" cy="0" r="4" fill="#ffffff" />

  </g>
</svg>